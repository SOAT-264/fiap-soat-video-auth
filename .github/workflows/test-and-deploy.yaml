name: Test and Deploy

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: auth_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage gate
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/auth_db_test
        run: python -m pytest

  build-and-deploy:
    needs: tests
    if: github.event_name == 'push'
    runs-on:
      - self-hosted
      - pc-wee
      - X64
    timeout-minutes: 30
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout auth repository
        uses: actions/checkout@v4
        with:
          path: fiap-soat-video-auth

      - name: Checkout shared repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-shared
          path: fiap-soat-video-shared

      - name: Checkout local-dev repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-local-dev
          path: fiap-soat-video-local-dev

      - name: Checkout observability repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-obs
          path: fiap-soat-video-obs

      - name: Validate runner tooling
        working-directory: ${{ github.workspace }}
        run: |
          $requiredCommands = @("docker", "git", "kubectl")

          foreach ($command in $requiredCommands) {
              if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
                  throw "Command '$command' was not found on the runner."
              }
          }

          docker version
          docker compose version
          kubectl version --client
          kubectl cluster-info

      - name: Start local base infrastructure
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev
        run: docker compose up -d --remove-orphans

      - name: Build local auth image
        working-directory: ${{ github.workspace }}
        run: docker build -t fiap-soat-video-auth:local -f fiap-soat-video-auth/Dockerfile .

      - name: Apply auth local-dev manifests
        working-directory: ${{ github.workspace }}/fiap-soat-video-auth
        run: |
          kubectl apply -k k8s/overlays/local-dev
          kubectl rollout restart deployment/auth-service -n video-processor
          kubectl rollout status deployment/auth-service -n video-processor --timeout=180s

      - name: Reload Traefik and Prometheus
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev
        run: docker compose restart traefik prometheus

      - name: Verify deployed auth service health
        run: |
          $response = Invoke-WebRequest -Uri http://localhost:32513/health -UseBasicParsing

          if ($response.StatusCode -ne 200) {
              throw "Auth service health check failed with status code $($response.StatusCode)."
          }